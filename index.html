<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zonterras Amsterdam</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    :root {
      --sun: #ffcc4d;
      --sun-soft: #fff2bd;
      --bg: #fff8e7;
      --text: #222;
      --card: #fff;
      --muted: #666;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 18px;
      background: var(--sun);
    }

    h1 {
      margin: 0;
      font-size: 26px;
    }

    p { margin: 6px 0 0; }

    .weather {
      margin-top: 8px;
      font-size: 14px;
      font-weight: bold;
    }

    .filters {
      padding: 12px;
      background: var(--sun-soft);
      display: flex;
      gap: 8px;
      overflow-x: auto;
      position: sticky;
      top: 0;
      z-index: 500;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 9px 13px;
      background: white;
      cursor: pointer;
      font-weight: bold;
      white-space: nowrap;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    button.active {
      background: var(--text);
      color: white;
    }

    #map {
      height: 58vh;
      width: 100%;
    }

    .list { padding: 16px; }

    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .card strong { font-size: 17px; }

    .rating {
      background: #222;
      color: white;
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      white-space: nowrap;
    }

    .tag {
      display: inline-block;
      background: #ffe9a8;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      margin-right: 5px;
      margin-top: 7px;
    }

    .meta {
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
    }

    a {
      color: #222;
      font-weight: bold;
    }

    .warning {
      background: #fff;
      border-left: 4px solid #d35400;
      padding: 12px;
      margin: 16px;
      border-radius: 10px;
    }

    .popup-title {
      font-weight: bold;
      font-size: 15px;
    }

    .popup-line { margin-top: 4px; }
  </style>
</head>

<body>
  <header>
    <h1>☀️ Zonterras Amsterdam</h1>
    <p>Terrassen met zon, reviews en kaart.</p>
    <div class="weather" id="weather">Weer laden...</div>
  </header>

  <div class="filters">
    <button class="active" onclick="setFilter('all', this)">Alles</button>
    <button onclick="setFilter('ochtend', this)">Ochtendzon</button>
    <button onclick="setFilter('middag', this)">Middagzon</button>
    <button onclick="setFilter('avond', this)">Avondzon</button>
    <button onclick="setFilter('water', this)">Aan water</button>
    <button onclick="setFilter('west', this)">West</button>
    <button onclick="setFilter('oost', this)">Oost</button>
    <button onclick="setFilter('baarsjes', this)">Baarsjes</button>
    <button onclick="setFilter('top', this)">Review 8+</button>
  </div>

  <div id="map"></div>
  <div id="warnings"></div>
  <section class="list" id="terraceList"></section>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./terraces.js"></script>

  <script>
    const map = L.map("map").setView([52.3676, 4.8900], 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "© OpenStreetMap"
    }).addTo(map);

    const list = document.getElementById("terraceList");
    const warnings = document.getElementById("warnings");
    let markers = [];
    let enrichedTerraces = [];

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function mapsLink(terrace) {
      if (terrace.googleMapsUrl) return terrace.googleMapsUrl;
      if (terrace.address) return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(terrace.address)}`;
      if (terrace.lat && terrace.lng) return `https://www.google.com/maps/search/?api=1&query=${terrace.lat},${terrace.lng}`;
      return "#";
    }

    function matchesFilter(terrace, filter) {
      if (filter === "all") return true;
      if (filter === "top") return Number(terrace.rating || 0) >= 8;
      return (terrace.tags || []).includes(filter);
    }

    function cacheKeyForAddress(address) {
      return `geocode:${address.toLowerCase().trim()}`;
    }

    async function geocodeAddress(address) {
      const cacheKey = cacheKeyForAddress(address);
      const cached = localStorage.getItem(cacheKey);

      if (cached) return JSON.parse(cached);

      const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=nl&q=${encodeURIComponent(address)}`;
      const response = await fetch(url, {
        headers: {
          "Accept": "application/json"
        }
      });

      if (!response.ok) throw new Error("Geocoding mislukt");

      const results = await response.json();

      if (!results || results.length === 0) return null;

      const location = {
        lat: Number(results[0].lat),
        lng: Number(results[0].lon)
      };

      localStorage.setItem(cacheKey, JSON.stringify(location));
      return location;
    }

    async function enrichTerracesWithLocations() {
      const enriched = [];
      const missing = [];

      for (const terrace of terraces) {
        let location = null;

        if (typeof terrace.lat === "number" && typeof terrace.lng === "number") {
          location = { lat: terrace.lat, lng: terrace.lng };
        } else if (terrace.address) {
          try {
            location = await geocodeAddress(terrace.address);
          } catch (error) {
            location = null;
          }
        }

        if (!location) {
          missing.push(terrace.name);
        }

        enriched.push({
          ...terrace,
          location
        });

        // Rustig aan doen met gratis geocoding.
        await new Promise(resolve => setTimeout(resolve, 250));
      }

      if (missing.length > 0) {
        warnings.innerHTML = `
          <div class="warning">
            <strong>Locatie niet gevonden:</strong><br>
            ${missing.map(escapeHtml).join(", ")}<br><br>
            Voeg voor deze plek handmatig <code>lat</code> en <code>lng</code> toe in <code>terraces.js</code>.
          </div>
        `;
      } else {
        warnings.innerHTML = "";
      }

      return enriched;
    }

    function renderTerraces(filter = "all") {
      list.innerHTML = "";
      markers.forEach(marker => map.removeLayer(marker));
      markers = [];

      const visibleTerraces = enrichedTerraces.filter(terrace =>
        terrace.location && matchesFilter(terrace, filter)
      );

      visibleTerraces.forEach((terrace) => {
        const loc = terrace.location;

        const safeName = escapeHtml(terrace.name);
        const safeArea = escapeHtml(terrace.area);
        const safeAddress = escapeHtml(terrace.address || "");
        const safeSun = escapeHtml(terrace.sun);
        const safeVibe = escapeHtml(terrace.vibe);
        const safeNotes = escapeHtml(terrace.notes || "");
        const safeRating = escapeHtml(terrace.rating ?? "-");
        const url = mapsLink(terrace);

        const marker = L.circleMarker([loc.lat, loc.lng], {
          radius: 8,
          weight: 2,
          fillOpacity: 1
        })
          .addTo(map)
          .bindPopup(`
            <div class="popup-title">${safeName}</div>
            <div class="popup-line">${safeArea}</div>
            ${safeAddress ? `<div class="popup-line">${safeAddress}</div>` : ""}
            <div class="popup-line">☀️ ${safeSun}</div>
            <div class="popup-line">⭐ Review: ${safeRating}/10</div>
            <div class="popup-line">${safeVibe}</div>
            ${safeNotes ? `<div class="popup-line"><em>${safeNotes}</em></div>` : ""}
            <div class="popup-line"><a href="${url}" target="_blank" rel="noopener">Open in Google Maps</a></div>
          `);

        markers.push(marker);

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="card-header">
            <div>
              <strong>${safeName}</strong><br>
              ${safeArea}
            </div>
            <div class="rating">⭐ ${safeRating}</div>
          </div>
          ${safeAddress ? `<div class="meta">${safeAddress}</div>` : ""}
          <span class="tag">☀️ ${safeSun}</span>
          <span class="tag">${safeVibe}</span>
          ${safeNotes ? `<div class="meta">${safeNotes}</div>` : ""}
          <div class="meta">
            <a href="${url}" target="_blank" rel="noopener">Open in Google Maps</a>
          </div>
        `;
        list.appendChild(card);
      });

      if (markers.length > 0) {
        const group = L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.18));
      }
    }

    function setFilter(filter, button) {
      document.querySelectorAll("button").forEach(btn => btn.classList.remove("active"));
      button.classList.add("active");
      renderTerraces(filter);
    }

    async function loadWeather() {
      try {
        const url = "https://api.open-meteo.com/v1/forecast?latitude=52.3676&longitude=4.9041&current=temperature_2m,cloud_cover,wind_speed_10m";
        const response = await fetch(url);
        const data = await response.json();

        const temp = Math.round(data.current.temperature_2m);
        const clouds = data.current.cloud_cover;
        const wind = Math.round(data.current.wind_speed_10m);

        let sky = "☀️ zonnig";
        if (clouds > 65) sky = "☁️ bewolkt";
        else if (clouds > 30) sky = "⛅ deels bewolkt";

        document.getElementById("weather").innerHTML =
          `${temp}°C · ${sky} · wind ${wind} km/u`;
      } catch (error) {
        document.getElementById("weather").innerHTML =
          "Weer kon niet geladen worden.";
      }
    }

    async function init() {
      document.getElementById("weather").innerHTML = "Locaties en weer laden...";
      enrichedTerraces = await enrichTerracesWithLocations();
      renderTerraces();
      loadWeather();
    }

    init();
  </script>
</body>
</html>
